<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mi Obra</title>
</head>

<body style="
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
color:white;
background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1503095396549-807759245b35');
background-size:cover;
background-position:center;
">

    <h1 style="font-size:50px;">Numeros imaginarios</h1>

    <p style="font-size:22px;">🎭 PASADO PRESENTE FUTURO </p>

    <h2 id="contador"></h2>

    <script>
        const fechaEvento = new Date("June 20, 2026 20:00:00").getTime();

        const contador = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaEvento - ahora;

            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

            document.getElementById("contador").innerHTML =
                "⏳ " + dias + "d " + horas + "h " + minutos + "m " + segundos + "s";

            if (distancia < 0) {
                clearInterval(contador);
                document.getElementById("contador").innerHTML = "¡Ya comenzó!";
            }
        }, 1000);
    </script>

</body>
</html>
